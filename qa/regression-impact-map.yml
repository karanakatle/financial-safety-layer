version: 1

commands:
  backend_pytest:
    description: Run the backend regression suite.
    command: "if [ -x .venv/bin/pytest ]; then .venv/bin/pytest; else python -m pytest; fi"
  android_unit:
    description: Run Android unit tests and Kotlin compile checks.
    command: "cd ArthamantriAndroid && ./gradlew --no-daemon :app:testDebugUnitTest"
  android_debug_build:
    description: Build the Android debug APK.
    command: "cd ArthamantriAndroid && ./gradlew --no-daemon :app:assembleDebug"
  android_release_build:
    description: Build signed release APK. Requires API_BASE_URL to be set.
    command: "test -n \"$API_BASE_URL\" && cd ArthamantriAndroid && ./gradlew --no-daemon :app:assembleRelease -PAPI_BASE_URL=\"$API_BASE_URL\""
  local_backend_health:
    description: Check local backend health on the emulator/debug backend port.
    command: "curl -fsS http://localhost:8765/api/health"
  privacy_policy_check:
    description: Check the hosted privacy policy URL is reachable.
    command: "curl -fsS https://karanakatle.github.io/finsaathi-legal/privacy-policy.html >/dev/null"
  git_status:
    description: Check repo cleanliness and untracked release secrets.
    command: "git status --short"

areas:
  backend_safety_policy:
    description: Backend risk classification, safety guidance, advice boundaries, and AI guardrails.
    trigger_tests:
      - DEV-001
      - DEV-015
      - INT-004
      - INT-005
      - INT-006
      - SIT-H-005
      - SIT-H-006
      - UAT-004
      - UAT-005
    automated_reruns:
      - DEV-001
      - DEV-015
      - INT-004
      - INT-005
      - INT-006
    manual_reruns:
      - SIT-H-005
      - SIT-H-006
      - UAT-004
      - UAT-005
    conditional_reruns:
      - UAT-004 if alert explanation or user-facing risk wording changed
      - UAT-005 if alert action labels or next-step copy changed
    jira_links:
      - causes regression risk for backend safety policy
      - verified by DEV-001
      - verified by INT-005
    run_commands:
      - backend_pytest

  backend_privacy_storage:
