services:
  - type: web
    name: arthamantri-api
    env: python
    plan: free
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/literacy/status
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      # Optional: set this in Render dashboard if using OpenAI voice provider.
      - key: OPENAI_API_KEY
        sync: false
