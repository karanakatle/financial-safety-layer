<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arthamantri Prototype</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="container">
    <h1>Arthamantri — Event-Driven Financial Safety Agent</h1>

    <section class="card">
      <h2>Financial State</h2>
      <div id="state" class="grid"></div>
    </section>

    <section class="card">
      <h2>Add Event</h2>
      <form id="tx-form">
        <label>Type
          <select name="type">
            <option value="expense">Expense</option>
            <option value="income">Income</option>
          </select>
        </label>
        <label>Amount (₹)
          <input name="amount" type="number" min="1" step="1" required />
        </label>
        <label>Category
          <input name="category" type="text" value="general" />
        </label>
        <button type="submit">Process Event</button>
      </form>
    </section>

    <section class="card">
      <h2>Voice Query</h2>
      <div class="row">
        <button id="mic-btn">🎤 Ask in Hindi/English</button>
        <input id="query" placeholder="e.g. Kitna paisa bacha hai?" />
        <button id="ask-btn">Ask</button>
      </div>
      <p id="voice-response"></p>
    </section>

    <section class="card">
      <h2>Agent Alerts</h2>
      <ul id="alerts"></ul>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
