name: Regression Pack

on:
  workflow_dispatch:
    inputs:
      test_id:
        description: "Failed test/story ID, for example SIT-D-011. Comma or space separated values are allowed."
        required: true
        type: string
      run_auto:
        description: "Run automated command pack"
        required: true
        default: true
        type: boolean
  pull_request:
    types:
      - opened
      - edited
      - synchronize
      - reopened

permissions:
  contents: read
  pull-requests: read

jobs:
  regression-pack:
    name: Regression impact check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect explicit regression test IDs
        id: detect
        env:
          EVENT_NAME: ${{ github.event_name }}
          MANUAL_TEST_ID: ${{ github.event.inputs.test_id || '' }}
          PR_TITLE: ${{ github.event.pull_request.title || '' }}
          PR_BODY: ${{ github.event.pull_request.body || '' }}
        run: |
          python3 - <<'PY'
          import os
          import re
          from pathlib import Path

          event_name = os.environ.get("EVENT_NAME", "")
          manual = os.environ.get("MANUAL_TEST_ID", "")
          pr_text = f"{os.environ.get('PR_TITLE', '')}\n{os.environ.get('PR_BODY', '')}"

          source = manual if event_name == "workflow_dispatch" else pr_text
          pattern = re.compile(r"\b(?:DEV|INT|SIT-H|SIT-D|PLAY|UAT|QA)-\d{3}\b", re.IGNORECASE)
          ids = []
          for match in pattern.findall(source):
              normalized = match.upper()
              if normalized not in ids:
                  ids.append(normalized)

          output_path = Path(os.environ["GITHUB_OUTPUT"])
          with output_path.open("a", encoding="utf-8") as output:
              output.write(f"test_ids={','.join(ids)}\n")
              output.write(f"has_ids={'true' if ids else 'false'}\n")

          summary_path = Path(os.environ["GITHUB_STEP_SUMMARY"])
          with summary_path.open("a", encoding="utf-8") as summary:
              summary.write("# Regression Pack Detection\n\n")
              if ids:
                  summary.write("Detected human-provided regression IDs:\n")
                  for item in ids:
                      summary.write(f"- `{item}`\n")
              else:
                  summary.write(
                      "No human-provided regression test/story ID was found. "
                      "The Regression Impact Agent will inspect changed files next. "
                      "You can still add an explicit ID such as `SIT-D-011` "
                      "to the PR title/body when you want to force a specific pack.\n"
                  )
          PY

      - name: Run Regression Impact Agent
        id: impact_agent
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_TITLE: ${{ github.event.pull_request.title || '' }}
          PR_BODY: ${{ github.event.pull_request.body || '' }}
        run: |
          set -euo pipefail
          scripts/suggest_regression_pack.py \
            --base "$BASE_SHA" \
            --head "$HEAD_SHA" \
            --pr-text "$PR_TITLE"$'\n'"$PR_BODY" \
            --summary-markdown "$GITHUB_STEP_SUMMARY" \
            --github-output "$GITHUB_OUTPUT"

      - name: Resolve regression IDs
        id: resolve
        env:
          EXPLICIT_IDS: ${{ steps.detect.outputs.test_ids }}
          AGENT_IDS: ${{ steps.impact_agent.outputs.suggested_ids || '' }}
        run: |
          python3 - <<'PY'
          import os
          from pathlib import Path

          def split_ids(value: str) -> list[str]:
              ids = []
              for chunk in value.replace(",", " ").split():
                  item = chunk.strip().upper()
                  if item and item not in ids:
                      ids.append(item)
              return ids

          explicit_ids = split_ids(os.environ.get("EXPLICIT_IDS", ""))
          agent_ids = split_ids(os.environ.get("AGENT_IDS", ""))

          resolved = []
          for item in explicit_ids + agent_ids:
              if item not in resolved:
                  resolved.append(item)

          output_path = Path(os.environ["GITHUB_OUTPUT"])
          with output_path.open("a", encoding="utf-8") as output:
              output.write(f"test_ids={','.join(resolved)}\n")
              output.write(f"has_ids={'true' if resolved else 'false'}\n")

          summary_path = Path(os.environ["GITHUB_STEP_SUMMARY"])
          with summary_path.open("a", encoding="utf-8") as summary:
              summary.write("\n# Regression Pack Resolution\n\n")
              if resolved:
                  summary.write("Regression IDs selected for this workflow:\n")
                  for item in resolved:
                      source = []
                      if item in explicit_ids:
                          source.append("human")
                      if item in agent_ids:
                          source.append("agent")
                      summary.write(f"- `{item}` ({', '.join(source)})\n")
              else:
                  summary.write(
                      "No regression IDs were selected. "
                      "Add a test ID manually or update the impact-agent rules if this change should trigger regression.\n"
                  )
          PY

      - name: Set up Python
        if: steps.resolve.outputs.has_ids == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install backend test dependencies
        if: steps.resolve.outputs.has_ids == 'true'
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Set up Java
        if: steps.resolve.outputs.has_ids == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Set up Android SDK
        if: steps.resolve.outputs.has_ids == 'true'
        uses: android-actions/setup-android@v3

      - name: Configure Android SDK path
        if: steps.resolve.outputs.has_ids == 'true'
        run: |
          set -euo pipefail
          SDK_DIR="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-}}"
          if [[ -z "$SDK_DIR" ]]; then
            echo "ANDROID_HOME/ANDROID_SDK_ROOT is not set after Android setup."
            exit 1
          fi
          echo "sdk.dir=$SDK_DIR" > ArthamantriAndroid/local.properties
          echo "Configured ArthamantriAndroid/local.properties with sdk.dir=$SDK_DIR"

      - name: Set up Gradle
        if: steps.resolve.outputs.has_ids == 'true'
        uses: gradle/actions/setup-gradle@v4

      - name: Validate regression impact map
        if: steps.resolve.outputs.has_ids == 'true'
        run: scripts/run_regression_pack.py --validate

      - name: Start local backend for integration packs
        if: steps.resolve.outputs.has_ids == 'true'
        env:
          EVENT_NAME: ${{ github.event_name }}
          RUN_AUTO_INPUT: ${{ github.event.inputs.run_auto || 'true' }}
        run: |
          set -euo pipefail
          if [[ "$EVENT_NAME" == "workflow_dispatch" && "$RUN_AUTO_INPUT" != "true" ]]; then
            echo "Manual workflow requested summary only; skipping local backend startup."
            exit 0
          fi

          python -m uvicorn backend.main:app --host 127.0.0.1 --port 8765 > /tmp/finsaathi-backend.log 2>&1 &
          echo "FINSAATHI_BACKEND_PID=$!" >> "$GITHUB_ENV"
          sleep 5
          if curl -fsS http://localhost:8765/api/health >/dev/null; then
            echo "Local backend is ready on port 8765."
          else
            echo "Local backend did not become ready yet. Command packs that require it may fail."
            cat /tmp/finsaathi-backend.log || true
          fi

      - name: Run automated regression packs
        if: steps.resolve.outputs.has_ids == 'true'
        env:
          EVENT_NAME: ${{ github.event_name }}
          RUN_AUTO_INPUT: ${{ github.event.inputs.run_auto || 'true' }}
          TEST_IDS: ${{ steps.resolve.outputs.test_ids }}
        run: |
          set -euo pipefail
          if [[ "$EVENT_NAME" == "workflow_dispatch" && "$RUN_AUTO_INPUT" != "true" ]]; then
            echo "Manual workflow requested summary only; skipping automated command pack."
            exit 0
          fi

          IFS=',' read -ra IDS <<< "$TEST_IDS"
          for TEST_ID in "${IDS[@]}"; do
            echo "::group::Automated regression pack for ${TEST_ID}"
            scripts/run_regression_pack.py "$TEST_ID" --run-auto --status-markdown "$GITHUB_STEP_SUMMARY"
            echo "::endgroup::"
          done

      - name: No regression pack requested
        if: steps.resolve.outputs.has_ids != 'true'
        run: |
          echo "No regression pack ID found. Skipping targeted automated reruns."
